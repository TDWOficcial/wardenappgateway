<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Crypto Gateway</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #111111; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-icon { color: #ff3366; font-size: 48px; display: none; margin-bottom: 15px; }
    </style>
</head>
<body> 
      <!-- WARDEN LUXURY LOGO START -->
      <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
          <img src="logo3.jpeg" alt="Warden Global Logo" style="width: 120px; height: 120px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));">
      </div>
      <!-- WARDEN LUXURY LOGO END -->
      
      <!-- Sitenin alt satırlarda kalan diğer kodları buradan aynen devam edecek -->

    <div id="loader-icon" class="loader"></div>
    <div id="error-mark" class="error-icon">❌</div>
    <h2 id="status-title">Warden Crypto</h2>
    <p id="status-desc">Verifying single-use session token...</p>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // Telegram'ın her Mini App açılışında tarayıcıya özel olarak fırlattığı güvenli ham veri
        const initDataUnsafe = window.Telegram.WebApp.initDataUnsafe;
        const userId = initDataUnsafe.user ? initDataUnsafe.user.id : null;
        const adminId = 5841291305;

        if (userId) {
            if (userId === adminId) {
                // Admin için her zaman doğrudan geçiş serbest
                allowAccess();
            } else {
                // Telegram'ın o saniyede ürettiği benzersiz sorgu zaman damgasını kilit olarak alıyoruz
                const authDateKey = initDataUnsafe.auth_date ? initDataUnsafe.auth_date.toString() : null;

                if (authDateKey) {
                    // Kullanıcının telefonunun yerel hafızasını kontrol et
                    const usedKeys = JSON.parse(localStorage.getItem('warden_used_sessions') || '[]');

                    // EĞER BU GİRİŞ ANAHTARI DAHA ÖNCE BİR KERE BİLE KULLANILDIYSA VEYA SAYFA YENİLENDİYSE:
                    if (usedKeys.includes(authDateKey)) {
                        showError("License Expired", "This active session has expired. Please return to the bot and type /start to generate a new secure link.");
                    } else {
                        // Anahtar taze! Bir sonraki yenilemede kilitlenmesi için hafızada "KULLANILDI" olarak işaretle
                        usedKeys.push(authDateKey);
                        localStorage.setItem('warden_used_sessions', JSON.stringify(usedKeys));
                        
                        allowAccess();
                    }
                } else {
                    showError("License Expired", "Invalid session structure. Please restart the bot via /start.");
                }
            }
        } else {
            showError("Access Denied", "Please open this application inside the Telegram Bot.");
        }

        function allowAccess() {
            document.getElementById("status-desc").innerText = "License verified! Redirecting...";
            setTimeout(() => {
                window.location.href = "https://user.aiminers.pro?ref=muradmirzayev2009@gmail.com";
            }, 1000);
        }

        function showError(title, desc) {
            document.getElementById("loader-icon").style.display = "none";
            document.getElementById("error-mark").style.display = "block";
            document.getElementById("status-title").innerText = title;
            document.getElementById("status-desc").innerText = desc;
        }
    </script>
</body>
</html>
