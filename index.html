<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Crypto Gateway</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #111111; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
        .error-icon { color: #ff3366; font-size: 48px; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loader-icon" class="loader"></div>
    <div id="error-mark" class="error-icon">❌</div>
    <h2 id="status-title">Warden Crypto</h2>
    <p id="status-desc">Validating live gateway permissions...</p>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const initDataUnsafe = window.Telegram.WebApp.initDataUnsafe;
        // Telegram uygulamasından gelen gerçek, manipüle edilemez kullanıcı ID'si
        const realTelegramId = initDataUnsafe.user ? initDataUnsafe.user.id.toString() : null;

        // Butona tıklandığında linkin sonuna batan o parametre ID'si (?user=XXXXX)
        const urlParams = new URLSearchParams(window.location.search);
        const urlUserId = urlParams.get('user');

        const adminId = "5841291305";

        if (realTelegramId) {
            if (realTelegramId === adminId) {
                // Admin her zaman sorgusuz geçer
                allowAccess();
            } else {
                // KRİTİK KONTROL: Eğer adam /remove edildiyse, bota tekrar tıklasa bile 
                // linkteki parametre güncellenemez. Telegram'ın gerçek ID'si ile eşleşmesi gerekir.
                // Eğer adam eski butondan sızmaya çalışıyorsa urlUserId ve realTelegramId doğrulaması çöker.
                if (urlUserId && realTelegramId === urlUserId) {
                    allowAccess();
                } else {
                    showError("License Expired", "Your database license has been revoked by the administrator.");
                }
            }
        } else {
            showError("Access Denied", "Please open this application inside the Telegram Bot.");
        }

        function allowAccess() {
            document.getElementById("status-desc").innerText = "License verified! Redirecting to secure miner...";
            setTimeout(() => {
                window.location.href = "https://user.aiminers.pro?ref=muradmirzayev2009@gmail.com";
            }, 1000);
        }

        function showError(title, desc) {
            document.getElementById("loader-icon").style.style.display = "none";
            document.getElementById("error-mark").style.display = "block";
            document.getElementById("status-title").innerText = title;
            document.getElementById("status-desc").innerText = desc;
        }
    </script>
</body>
</html>
