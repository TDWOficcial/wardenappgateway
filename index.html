<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Crypto Gateway</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #111111; color: #ffffff; font-family: sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-align: center; padding: 20px;
        }
        .loader {
            border: 4px solid #333; border-top: 4px solid #00ffcc; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-weight: 400; letter-spacing: 1px; margin: 10px 0; }
        p { color: #888; font-size: 14px; max-width: 300px; line-height: 1.5; }
        .error-icon { color: #ff3366; font-size: 48px; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loader-icon" class="loader"></div>
    <div id="error-mark" class="error-icon">❌</div>
    <h2 id="status-title">Warden Crypto</h2>
    <p id="status-desc">Verifying your active token, please wait...</p>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // 1. Telegram'dan giriş yapan güncel kullanıcının ID'sini al
        const initDataUnsafe = window.Telegram.WebApp.initDataUnsafe;
        const currentUserId = initDataUnsafe.user ? initDataUnsafe.user.id : null;

        // 2. Linkin sonundaki o gizli şifreyi (auth tokenı) oku
        const urlParams = new URLSearchParams(window.location.search);
        const incomingToken = urlParams.get('auth');

        // Beklenen doğru şifre yapısını oluşturuyoruz
        const expectedUserToken = "warden_active_" + currentUserId;
        const expectedAdminToken = "warden_active_admin";

        // GÜVENLİK KONTROLÜ: Linkteki şifre, içeri girmeye çalışan adamın ID'siyle eşleşiyor mu?
        if (currentUserId && (incomingToken === expectedUserToken || incomingToken === expectedAdminToken)) {
            document.getElementById("status-desc").innerText = "Token verified! Connecting to secure node...";
            setTimeout(() => {
                // Her şey doğruysa asıl siteye fırlat
                window.location.href = "https://user.aiminers.pro?ref=muradmirzayev2009@gmail.com";
            }, 1500);
        } else {
            // Şifre yanlışsa, eski mesajsa veya eşleşmiyorsa anında patlat
            document.getElementById("loader-icon").style.display = "none";
            document.getElementById("error-mark").style.display = "block";
            document.getElementById("status-title").innerText = "License Expired";
            document.getElementById("status-desc").innerText = "Your active session has ended or been revoked. Please contact the administrator.";
        }
    </script>
</body>
</html>
