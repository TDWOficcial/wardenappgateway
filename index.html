<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Crypto Gateway</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #111111; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-icon { color: #ff3366; font-size: 48px; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loader-icon" class="loader"></div>
    <div id="error-mark" class="error-icon">❌</div>
    <h2 id="status-title">Warden Crypto</h2>
    <p id="status-desc">Verifying single-use session key...</p>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const initData = window.Telegram.WebApp.initData;
        const initDataUnsafe = window.Telegram.WebApp.initDataUnsafe;
        const userId = initDataUnsafe.user ? initDataUnsafe.user.id : null;

        const adminId = 5841291305;

        if (initData && userId) {
            if (userId === adminId) {
                // Admin her zaman pürüzsüz geçer
                allowAccess();
            } else {
                // TELEGRAM VERİSİNİN BENZERSİZ HASH DEĞERİNİ ALIYORUZ (Her tıklamada değişen imza)
                const urlParams = new URLSearchParams(initData);
                const sessionHash = urlParams.get('hash');

                // Telefonun kalıcı tarayıcı hafızasını kontrol et (localStorage)
                const usedKeys = JSON.parse(localStorage.getItem('warden_used_hashes') || '[]');

                // EĞER BU BUTON/İMZA DAHA ÖNCE BİR KERE BİLE KULLANILDIYSA VEYA SAYFA YENİLENDİYSE:
                if (usedKeys.includes(sessionHash)) {
                    showError("License Expired", "This session has already been used. Please return to the bot and generate a new secure link via /start.");
                } else {
                    // Anahtar taze! Bir sonraki yenilemede engellemek için bu anahtarı hafızada "KULLANILDI" olarak işaretle
                    usedKeys.push(sessionHash);
                    localStorage.setItem('warden_used_hashes', JSON.stringify(usedKeys));
                    
                    allowAccess();
                }
            }
        } else {
            showError("Access Denied", "Please open this application inside the Telegram Bot.");
        }

        function allowAccess() {
            document.getElementById("status-desc").innerText = "License verified! Redirecting...";
            setTimeout(() => {
                window.location.href = "https://user.aiminers.pro?ref=muradmirzayev2009@gmail.com";
            }, 1000);
        }

        function showError(title, desc) {
            document.getElementById("loader-icon").style.display = "none";
            document.getElementById("error-mark").style.display = "block";
            document.getElementById("status-title").innerText = title;
            document.getElementById("status-desc").innerText = desc;
        }
    </script>
</body>
</html>
